<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 24" width="100%">
  <defs>
    <linearGradient id="divBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#60a5fa" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="24" fill="url(#divBg)"/>

  <!-- Central glow line -->
  <line x1="0" y1="12" x2="1000" y2="12" stroke="url(#glowLine)" stroke-width="1" filter="url(#lineGlow)"/>

  <!-- Stars along the divider -->
  <circle cx="48"  cy="12" r="1.0" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite" begin="0s"/></circle>
  <circle cx="105" cy="7"  r="0.7" fill="#a78bfa"><animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="168" cy="17" r="0.8" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="235" cy="12" r="1.1" fill="#60a5fa"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.6s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="298" cy="6"  r="0.7" fill="white"><animate attributeName="opacity" values="1;0.1;1" dur="2.7s" repeatCount="indefinite" begin="0.2s"/></circle>
  <circle cx="362" cy="18" r="0.9" fill="white"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.9s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="428" cy="12" r="1.3" fill="#22d3ee"><animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="500" cy="12" r="1.6" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.0s" repeatCount="indefinite" begin="0.1s"/></circle>
  <circle cx="572" cy="12" r="1.3" fill="#60a5fa"><animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite" begin="0.7s"/></circle>
  <circle cx="638" cy="7"  r="0.9" fill="white"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.9s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="702" cy="18" r="0.7" fill="#a78bfa"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="765" cy="12" r="1.1" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.7s" repeatCount="indefinite" begin="0.2s"/></circle>
  <circle cx="832" cy="17" r="0.8" fill="#22d3ee"><animate attributeName="opacity" values="1;0.2;1" dur="2.3s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="895" cy="7"  r="0.7" fill="white"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.0s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="952" cy="12" r="1.0" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" begin="0.8s"/></circle>
</svg>
