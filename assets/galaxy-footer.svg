<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 180" width="100%">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020024"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <radialGradient id="fn1" cx="25%" cy="58%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fn2" cx="75%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="3" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fsg">
      <feGaussianBlur stdDeviation="1.8" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Wave fill -->
  <path d="M0,40 Q125,18 250,40 Q375,62 500,40 Q625,18 750,40 Q875,62 1000,40 L1000,180 L0,180 Z" fill="url(#fbg)"/>

  <!-- Nebulas -->
  <ellipse cx="250" cy="120" rx="240" ry="100" fill="url(#fn1)"/>
  <ellipse cx="750" cy="105" rx="220" ry="110" fill="url(#fn2)"/>

  <!-- Wave glow stroke -->
  <path d="M0,40 Q125,18 250,40 Q375,62 500,40 Q625,18 750,40 Q875,62 1000,40" fill="none" stroke="url(#wl)" stroke-width="1.5" filter="url(#fg)"/>

  <!-- Crest diamonds -->
  <circle cx="125"  cy="18" r="2.8" fill="#60a5fa"  filter="url(#fsg)"><animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite" begin="0s"/></circle>
  <circle cx="375"  cy="62" r="2.2" fill="#a78bfa"  filter="url(#fsg)"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.8s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="500"  cy="40" r="3.0" fill="white"    filter="url(#fsg)"><animate attributeName="opacity" values="1;0.4;1" dur="4.0s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="625"  cy="18" r="2.5" fill="#22d3ee"  filter="url(#fsg)"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.5s" repeatCount="indefinite" begin="1.0s"/></circle>
  <circle cx="875"  cy="62" r="2.0" fill="#a78bfa"  filter="url(#fsg)"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite" begin="0.8s"/></circle>

  <!-- Stars row 1 (y 55-75) -->
  <circle cx="48"  cy="60" r="0.8" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite" begin="0s"/></circle>
  <circle cx="148" cy="56" r="1.0" fill="#60a5fa"><animate attributeName="opacity" values="0.7;1;0.7" dur="1.7s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="265" cy="70" r="0.7" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" begin="0.7s"/></circle>
  <circle cx="390" cy="58" r="0.9" fill="white"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.4s" repeatCount="indefinite" begin="0.2s"/></circle>
  <circle cx="518" cy="68" r="1.1" fill="#a78bfa"><animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="648" cy="57" r="0.8" fill="white"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.9s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="772" cy="69" r="1.0" fill="#22d3ee"><animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite" begin="0.1s"/></circle>
  <circle cx="895" cy="57" r="0.7" fill="white"><animate attributeName="opacity" values="0.7;1;0.7" dur="1.6s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="968" cy="66" r="0.9" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="2.0s" repeatCount="indefinite" begin="0.3s"/></circle>

  <!-- Stars row 2 (y 80-110) -->
  <circle cx="32"  cy="92"  r="1.2" fill="white"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.6s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="118" cy="104" r="0.8" fill="#a78bfa"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="0.2s"/></circle>
  <circle cx="232" cy="90"  r="1.0" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.0s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="358" cy="100" r="0.9" fill="#60a5fa"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="482" cy="88"  r="1.3" fill="white"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="612" cy="98"  r="0.7" fill="white"><animate attributeName="opacity" values="1;0.4;1" dur="2.7s" repeatCount="indefinite" begin="0.1s"/></circle>
  <circle cx="738" cy="90"  r="1.1" fill="#22d3ee"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.0s" repeatCount="indefinite" begin="0.7s"/></circle>
  <circle cx="862" cy="102" r="0.8" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="1.7s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="952" cy="92"  r="1.0" fill="white"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.4s" repeatCount="indefinite" begin="0.8s"/></circle>

  <!-- Stars flanking text (y 115-140, away from center 300-700) -->
  <circle cx="42"  cy="120" r="0.9" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="1.9s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="138" cy="132" r="0.7" fill="#60a5fa"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.3s" repeatCount="indefinite" begin="0.2s"/></circle>
  <circle cx="228" cy="118" r="1.1" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite" begin="0.7s"/></circle>
  <circle cx="762" cy="122" r="0.8" fill="white"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.6s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="858" cy="135" r="1.0" fill="#a78bfa"><animate attributeName="opacity" values="1;0.4;1" dur="2.1s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="958" cy="120" r="0.9" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite" begin="0.1s"/></circle>

  <!-- Stars bottom band (y 150-175) -->
  <circle cx="68"  cy="158" r="0.8" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="2.0s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="178" cy="168" r="1.2" fill="#22d3ee"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.8s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="305" cy="155" r="0.7" fill="white"><animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="428" cy="170" r="0.9" fill="white"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.5s" repeatCount="indefinite" begin="0.2s"/></circle>
  <circle cx="555" cy="158" r="1.1" fill="#60a5fa"><animate attributeName="opacity" values="1;0.3;1" dur="2.9s" repeatCount="indefinite" begin="0.7s"/></circle>
  <circle cx="682" cy="168" r="0.8" fill="white"><animate attributeName="opacity" values="0.7;0.4;0.7" dur="1.7s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="808" cy="156" r="1.0" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="2.3s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="928" cy="165" r="0.7" fill="#a78bfa"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.0s" repeatCount="indefinite" begin="0.1s"/></circle>

  <!-- Bright hero stars -->
  <circle cx="88"  cy="88"  r="2.2" fill="white"   filter="url(#fsg)"><animate attributeName="opacity" values="1;0.3;1" dur="4.0s" repeatCount="indefinite" begin="0s"/></circle>
  <circle cx="912" cy="96"  r="2.0" fill="#60a5fa" filter="url(#fsg)"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite" begin="1.2s"/></circle>
  <circle cx="500" cy="160" r="1.8" fill="#a78bfa" filter="url(#fsg)"><animate attributeName="opacity" values="1;0.4;1" dur="3.2s" repeatCount="indefinite" begin="0.7s"/></circle>

  <!-- Shooting star -->
  <g opacity="0">
    <line x1="0" y1="80" x2="24" y2="76" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" from="-50,0" to="1100,60" dur="2.8s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="opacity" values="0;0;0.85;0.85;0" dur="2.8s" repeatCount="indefinite" begin="4s" keyTimes="0;0.05;0.2;0.75;1"/>
  </g>

  <!-- Brand text -->
  <text x="500" y="116" text-anchor="middle"
        font-family="'Trebuchet MS',Arial,sans-serif"
        font-size="17" font-weight="700" letter-spacing="3.5"
        fill="#60a5fa" filter="url(#fg)">&#9883;  THE ATOMIC PROGRAMMER</text>

  <text x="500" y="140" text-anchor="middle"
        font-family="Arial,sans-serif"
        font-size="12" fill="#a78bfa" letter-spacing="1.5">Building the future, one atom at a time.</text>

  <!-- Thin divider line -->
  <line x1="330" y1="150" x2="670" y2="150" stroke="url(#wl)" stroke-width="0.5" opacity="0.6"/>

  <text x="500" y="165" text-anchor="middle"
        font-family="Arial,sans-serif"
        font-size="10" fill="#6e7681" letter-spacing="1">
    Pflugerville, TX  &#183;  hiram1397@gmail.com  &#183;  787-833-3094
  </text>
</svg>
