      <ellipse cx="122" cy="94" rx="105" ry="34" stroke="url(#atomGrad)" stroke-width="9" transform="rotate(25 122 94)" opacity=".86"/>
      <ellipse cx="122" cy="94" rx="105" ry="34" stroke="url(#atomGrad)" stroke-width="9" transform="rotate(90 122 94)" opacity=".75"/>
