    <text x="177" y="482" fill="#E0F2FE" font-family="Montserrat, Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4">PROGRAMMER</text>
  </g>

  <g transform="translate(780 148)">
    <text x="210" y="34" fill="#F8FAFC" font-family="Montserrat, Inter, Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="26" filter="url(#textGlow)">WELCOME</text>
    <text x="290" y="91" fill="#FFFFFF" font-family="Montserrat, Inter, Arial, sans-serif" font-size="38" font-weight="900" letter-spacing="3">TO THE</text>
    <text x="0" y="210" fill="#FFFFFF" font-family="Montserrat, Inter, Arial, sans-serif" font-size="126" font-weight="900" letter-spacing="-5" filter="url(#textGlow)">FUTURE</text>
    <text x="20" y="305" fill="#FFFFFF" font-family="Montserrat, Inter, Arial, sans-serif" font-size="62" font-weight="900">OF</text>
    <text x="158" y="305" fill="url(#learningGrad)" font-family="Montserrat, Inter, Arial, sans-serif" font-size="86" font-weight="900" letter-spacing="-2" filter="url(#neon)">LEARNING</text>
    <text x="132" y="385" fill="#F8FAFC" font-family="Montserrat, Inter, Arial, sans-serif" font-size="34" font-weight="800">Code. <tspan fill="#22D3EE">Learn.</tspan> <tspan fill="#A855F7">Build the Future.</tspan></text>
